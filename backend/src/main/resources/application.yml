spring:
  application:
    name: biar-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/biar
    username: biar
    password: biar_dev
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: biar-dev-secret-key-change-in-production
  expiration: 86400000

logging:
  level:
    com.biar: DEBUG
    org.springframework.security: INFO
