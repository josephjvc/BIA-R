services:
  backend:
    image: biar-backend-dev
    container_name: biar-back-dev
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend/src:/app/src
      - ./backend/pom.xml:/app/pom.xml
      - maven_cache:/app/.m2
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MAVEN_OPTS: -Dmaven.repo.local=/app/.m2

  frontend:
    image: biar-frontend-dev
    container_name: biar-front-dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/package.json:/app/package.json
      - ./frontend/pnpm-lock.yaml:/app/pnpm-lock.yaml
      - ./frontend/pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./frontend/.npmrc:/app/.npmrc
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
      - ./frontend/.env:/app/.env:ro
    environment:
      VITE_API_URL: ""
      VITE_PROXY_TARGET: http://backend:8080

volumes:
  maven_cache: